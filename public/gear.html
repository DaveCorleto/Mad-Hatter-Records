<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css?v=17">
  <title>Gear — Mad Hatter Records</title>
</head>

<body>

  <div class="site-bg">
    <div class="site-bg__layer site-bg__layer--1 is-active"></div>
    <div class="site-bg__layer site-bg__layer--2"></div>
  </div>

  <header class="topbar">
    <div class="brand">
      <a class="brand__name" href="index.html">Mad Hatter Records</a>
      <span class="brand__tagline" data-i18n="brand.tagline"></span>
    </div>

    <nav class="nav-desktop" aria-label="Primary navigation">
      <ul class="nav-desktop__list">
        <li><a class="nav-desktop__link" href="index.html" data-i18n="nav.home"></a></li>
        <li><a class="nav-desktop__link" href="records.html" data-i18n="nav.records"></a></li>
        <li><a class="nav-desktop__link" href="about.html" data-i18n="nav.bio"></a></li>
        <li><a class="nav-desktop__link is-active" href="gear.html" data-i18n="nav.gear"></a></li>
        <li><a class="nav-desktop__link" href="contact.html" data-i18n="nav.contact"></a></li>
      </ul>
    </nav>

    <div class="lang-switcher">
      <span class="lang-switcher__icon" aria-hidden="true">
        <i class="fa-solid fa-language"></i>
      </span>
      <label for="lang-select" class="visually-hidden">Language</label>
      <select id="lang-select" aria-label="Language selector">
        <option value="en">English</option>
        <option value="it">Italiano</option>
      </select>
    </div>

    <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <nav class="mobile-menu" id="mobile-menu" aria-label="Mobile navigation">
    <div class="mobile-menu__inner">
      <ul class="mobile-menu__list">
        <li><a class="mobile-menu__link" href="index.html" data-i18n="nav.home"></a></li>
        <li><a class="mobile-menu__link" href="records.html" data-i18n="nav.records"></a></li>
        <li><a class="mobile-menu__link" href="about.html" data-i18n="nav.bio"></a></li>
        <li><a class="mobile-menu__link is-active" href="gear.html" data-i18n="nav.gear"></a></li>
        <li><a class="mobile-menu__link" href="contact.html" data-i18n="nav.contact"></a></li>
      </ul>

      <div class="lang-switcher lang-switcher--mobile">
        <label for="lang-select-mobile" class="visually-hidden">Language</label>
        <select id="lang-select-mobile" aria-label="Mobile language selector">
          <option value="en">English</option>
          <option value="it">Italiano</option>
        </select>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="hero">
      <p class="hero__kicker" data-i18n="gearPage.hero.kicker"></p>
      <h1 class="hero__title" data-i18n="gearPage.hero.title"></h1>
      <p class="hero__subtitle" data-i18n="gearPage.hero.subtitle"></p>
    </section>

    <section id="gear-container" class="gear-layout" aria-live="polite"></section>
  </main>

  <footer class="footer">
    <p class="footer__text">
      © <span id="year"></span> Mad Hatter Records · <a href="privacy.html" data-i18n="footer.privacy"></a>
    </p>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

  <script>
    const images = [
      "images/hero1.webp",
      "images/hero2.webp",
      "images/hero3.webp"
    ];

    let index = 0;
    let showingFirst = true;

    const bg1 = document.querySelector(".site-bg__layer--1");
    const bg2 = document.querySelector(".site-bg__layer--2");

    if (bg1 && bg2) {
      bg1.style.backgroundImage = `url('${images[0]}')`;
      bg2.style.backgroundImage = `url('${images[1]}')`;

      setInterval(() => {
        index = (index + 1) % images.length;
        const nextImage = images[index];

        if (showingFirst) {
          bg2.style.backgroundImage = `url('${nextImage}')`;
          bg2.classList.add("is-active");
          bg1.classList.remove("is-active");
        } else {
          bg1.style.backgroundImage = `url('${nextImage}')`;
          bg1.classList.add("is-active");
          bg2.classList.remove("is-active");
        }

        showingFirst = !showingFirst;
      }, 6500);
    }
  </script>

  <script>
    const navToggle = document.querySelector(".nav-toggle");
    const mobileMenu = document.querySelector(".mobile-menu");
    const body = document.body;
    const mobileMenuLinks = document.querySelectorAll(".mobile-menu__link");

    if (navToggle && mobileMenu) {
      navToggle.addEventListener("click", () => {
        const isOpen = mobileMenu.classList.toggle("is-open");
        navToggle.classList.toggle("is-open");
        body.classList.toggle("menu-open", isOpen);
        navToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });

      mobileMenuLinks.forEach(link => {
        link.addEventListener("click", () => {
          mobileMenu.classList.remove("is-open");
          navToggle.classList.remove("is-open");
          body.classList.remove("menu-open");
          navToggle.setAttribute("aria-expanded", "false");
        });
      });
    }
  </script>

  <script>
    async function loadLanguage(lang) {
      const res = await fetch(`/lang/${lang}.json`);
      const translations = await res.json();

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        const value = key.split(".").reduce((obj, k) => obj?.[k], translations);
        if (!value) return;

        if (value.includes("<")) {
          el.innerHTML = value;
        } else {
          el.textContent = value;
        }
      });

      document.documentElement.lang = lang;
      localStorage.setItem("lang", lang);

      const desktopSelect = document.getElementById("lang-select");
      const mobileSelect = document.getElementById("lang-select-mobile");

      if (desktopSelect) desktopSelect.value = lang;
      if (mobileSelect) mobileSelect.value = lang;
    }

    function getNestedValue(obj, path) {
      return path.split(".").reduce((acc, key) => acc?.[key], obj);
    }

    function groupByCategory(items, fallbackLabel) {
      return items.reduce((groups, item) => {
        const key = item.categoryLabel || fallbackLabel;

        if (!groups[key]) {
          groups[key] = [];
        }

        groups[key].push(item);
        return groups;
      }, {});
    }

    function renderGroupedGear(gear, translations) {
      const otherLabel = getNestedValue(translations, "gearPage.states.otherCategory") || "Other";
      const grouped = groupByCategory(gear, otherLabel);

      return Object.entries(grouped).map(([category, items]) => `
        <section class="gear-section">
          <h2 class="gear-section__title">${category}</h2>

          <div class="grid gear-grid">
            ${items.map(item => `
              <article class="card gear-card">
                <div class="gear-card__media">
                  <img
                    src="${item.imageUrl}"
                    alt="${item.name}"
                    loading="lazy"
                    decoding="async"
                  >
                </div>
                <h3 class="card__title">${item.name}</h3>
              </article>
            `).join("")}
          </div>
        </section>
      `).join("");
    }

    async function loadGear() {
      const container = document.getElementById("gear-container");
      const lang = localStorage.getItem("lang") || "en";

      try {
        const translationsRes = await fetch(`/lang/${lang}.json`);
        const translations = await translationsRes.json();

        container.innerHTML = `
          <section class="gear-section">
            <article class="card">
              <h2 class="card__title">${getNestedValue(translations, "gearPage.states.loadingTitle") || "Loading gear"}</h2>
              <p class="card__text">${getNestedValue(translations, "gearPage.states.loadingText") || "Fetching instruments..."}</p>
            </article>
          </section>
        `;

        const res = await fetch("https://gear-api-650861896662.europe-west1.run.app/api/gear");

        if (!res.ok) {
          throw new Error("Failed to load gear data.");
        }

        const gear = await res.json();

        if (!gear.length) {
          container.innerHTML = `
            <section class="gear-section">
              <article class="card">
                <h2 class="card__title">${getNestedValue(translations, "gearPage.states.emptyTitle") || "No gear yet"}</h2>
                <p class="card__text">${getNestedValue(translations, "gearPage.states.emptyText") || "The gear collection is currently empty."}</p>
              </article>
            </section>
          `;
          return;
        }

        container.innerHTML = renderGroupedGear(gear, translations);
      } catch (error) {
        try {
          const translationsRes = await fetch(`/lang/${lang}.json`);
          const translations = await translationsRes.json();

          container.innerHTML = `
            <section class="gear-section">
              <article class="card">
                <h2 class="card__title">${getNestedValue(translations, "gearPage.states.errorTitle") || "Gear unavailable"}</h2>
                <p class="card__text">${getNestedValue(translations, "gearPage.states.errorText") || "The gear list could not be loaded at the moment."}</p>
              </article>
            </section>
          `;
        } catch {
          container.innerHTML = `
            <section class="gear-section">
              <article class="card">
                <h2 class="card__title">Gear unavailable</h2>
                <p class="card__text">The gear list could not be loaded at the moment.</p>
              </article>
            </section>
          `;
        }

        console.error(error);
      }
    }

    const savedLang = localStorage.getItem("lang") || "en";
    loadLanguage(savedLang).then(loadGear);

    const langSelect = document.getElementById("lang-select");
    const langSelectMobile = document.getElementById("lang-select-mobile");

    if (langSelect) {
      langSelect.addEventListener("change", async (e) => {
        await loadLanguage(e.target.value);
        await loadGear();
      });
    }

    if (langSelectMobile) {
      langSelectMobile.addEventListener("change", async (e) => {
        await loadLanguage(e.target.value);
        await loadGear();
      });
    }
  </script>

</body>
</html>
